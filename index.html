<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Weather Dashboard</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n            background-color: #f0f0f0;\n        }\n        .container {\n            width: 80%;\n            margin: auto;\n            overflow: hidden;\n        }\n        header {\n            background: #35424a;\n            color: #ffffff;\n            padding: 10px 0;\n            text-align: center;\n        }\n        #search {\n            margin: 20px 0;\n        }\n        #weatherDisplay {\n            display: flex;\n            justify-content: space-around;\n        }\n        .card {\n            background: white;\n            border-radius: 5px;\n            padding: 15px;\n            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);\n        }\n        footer {\n            text-align: center;\n            padding: 10px 0;\n            background: #35424a;\n            color: white;\n            position: relative;\n            bottom: 0;\n            width: 100%;\n        }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>Weather Dashboard</h1>\n        <input type="text" id="search" placeholder="Enter city...">\n        <button onclick="getWeather()">Search</button>\n    </header>\n    <div class="container">\n        <div id="weatherDisplay">\n            <div class="card">\n                <h3>Current Weather</h3>\n                <p id="currentWeather"></p>\n            </div>\n            <div class="card">\n                <h3>Temperature</h3>\n                <p id="temperature"></p>\n            </div>\n            <div class="card">\n                <h3>Humidity</h3>\n                <p id="humidity"></p>\n            </div>\n            <div class="card">\n                <h3>Wind Speed</h3>\n                <p id="windSpeed"></p>\n            </div>\n        </div>\n        <div id="forecastDisplay">\n            <h3>5-Day Forecast</h3>\n            <div id="forecast" style="display:flex; justify-content: space-between;"></div>\n        </div>\n    </div>\n    <footer>\n        <p>&copy; 2026 Weather Dashboard</p>\n    </footer>\n    <script>\n        const apiKey = 'YOUR_API_KEY'; // Replace with your OpenWeatherMap API key\n\n        async function getWeather() {\n            const city = document.getElementById('search').value;\n            const currentWeatherResponse = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);\n            const currentWeatherData = await currentWeatherResponse.json();\n\n            document.getElementById('currentWeather').innerText = currentWeatherData.weather[0].description;\n            document.getElementById('temperature').innerText = `${currentWeatherData.main.temp} °C`;\n            document.getElementById('humidity').innerText = `${currentWeatherData.main.humidity}%`;\n            document.getElementById('windSpeed').innerText = `${currentWeatherData.wind.speed} m/s`;\n\n            getForecast(currentWeatherData.coord.lat, currentWeatherData.coord.lon);\n        }\n\n        async function getForecast(lat, lon) {\n            const forecastResponse = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`);\n            const forecastData = await forecastResponse.json();\n            const forecastDisplay = document.getElementById('forecast');\n            forecastDisplay.innerHTML = '';\n            for (let i = 0; i < forecastData.list.length; i += 8) {\n                const forecast = forecastData.list[i];\n                forecastDisplay.innerHTML += `<div class='card'><p>${new Date(forecast.dt * 1000).toLocaleDateString()}<br>${forecast.main.temp} °C<br>${forecast.weather[0].description}</p></div>`;\n            }\n        }\n    </script>\n</body>\n</html>
